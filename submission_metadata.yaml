ai_usage_summary: |
  ChatGPT was used for architecture discussions, documentation improvements,
  presentation preparation, debugging assistance, and code optimization.
  GitHub Copilot was used for code completion and faster development.
  All machine learning models, ranking logic, feature engineering,
  behavioral scoring, honeypot detection, and evaluation pipeline were
  implemented and verified by our team.
  No candidate data was sent to external AI services during ranking.
  The final ranking pipeline runs completely offline without internet access.

# ============================================================================
# Methodology Summary
# ============================================================================

methodology_summary: |
  TalentForge AI is an intelligent candidate ranking system that combines
  semantic understanding, hybrid retrieval, behavioral intelligence,
  explainable AI, and fake profile detection.

  The system uses SentenceTransformer (all-MiniLM-L6-v2) embeddings,
  FAISS vector search, BM25 retrieval, and an automatic TF-IDF fallback
  for large datasets.

  Every candidate is evaluated across 15 weighted scoring dimensions,
  including semantic similarity, experience, behavioral signals,
  retrieval expertise, career growth, education, leadership,
  startup mindset, and job stability.

  Additionally, 23 behavioral signals are analyzed and seven honeypot
  detection rules identify suspicious profiles.

  The entire pipeline is fully CPU-based, processes over 100,000
  candidates in under five minutes, requires no GPU or external APIs,
  and produces transparent rank-aware explanations for every candidate.

# ============================================================================
